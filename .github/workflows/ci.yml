name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm depcruise
      - run: pnpm audit --prod --audit-level=high
      - run: pnpm codegen:docs
      - run: git diff --exit-code docs/api/
      - name: Verify changeset on package changes
        if: github.event_name == 'pull_request'
        run: node scripts/check-changeset.mjs origin/${{ github.base_ref }}

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @agent-ready/schema build
      - run: pnpm --filter @agent-ready/runtime build
      - run: pnpm test:coverage

  schema-zod-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        zod-version: ["3.25.28"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm add -D zod@${{ matrix.zod-version }} --filter @agent-ready/schema
      - run: pnpm --filter @agent-ready/schema build
      - run: pnpm --filter @agent-ready/schema test -- adapter
